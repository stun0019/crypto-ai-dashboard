<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="BingX USDT 永續合約市場掃描器"
  >

  <title>Crypto AI Dashboard</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <main class="container">
    <header class="page-header">
      <div>
        <p class="eyebrow">BingX Futures Market Scanner</p>
        <h1>Crypto AI Dashboard</h1>
        <p class="subtitle">
          掃描 BingX USDT 永續合約市場
        </p>
      </div>

      <button
        id="refreshButton"
        class="primary-button"
        type="button"
      >
        重新整理
      </button>
    </header>

    <section class="summary-grid">
      <article class="summary-card">
        <span class="summary-label">API 狀態</span>

        <strong
          id="apiStatus"
          class="summary-value status-idle"
        >
          等待連線
        </strong>

        <span
          id="apiStatusNote"
          class="summary-note"
        >
          尚未讀取資料
        </span>
      </article>

      <article class="summary-card">
        <span class="summary-label">USDT 合約總數</span>

        <strong
          id="totalContracts"
          class="summary-value"
        >
          0
        </strong>

        <span class="summary-note">
          BingX 永續合約
        </span>
      </article>

      <article class="summary-card">
        <span class="summary-label">目前顯示</span>

        <strong
          id="visibleContracts"
          class="summary-value"
        >
          0
        </strong>

        <span class="summary-note">
          搜尋與篩選結果
        </span>
      </article>

      <article class="summary-card">
        <span class="summary-label">最後更新</span>

        <strong
          id="lastUpdated"
          class="summary-value summary-time"
        >
          尚未更新
        </strong>

        <span class="summary-note">
          本機時間
        </span>
      </article>
    </section>

    <section class="toolbar">
      <label class="control-group">
        <span>搜尋標的</span>

        <input
          id="searchInput"
          class="control"
          type="search"
          placeholder="搜尋 BTC、ETH、SOL..."
          autocomplete="off"
        >
      </label>

      <label class="control-group">
        <span>排序方式</span>

        <select
          id="sortSelect"
          class="control"
        >
          <option value="quoteVolume-desc">
            24H 成交額：高到低
          </option>

          <option value="quoteVolume-asc">
            24H 成交額：低到高
          </option>

          <option value="change-desc">
            24H 漲跌：高到低
          </option>

          <option value="change-asc">
            24H 漲跌：低到高
          </option>

          <option value="price-desc">
            最新價格：高到低
          </option>

          <option value="price-asc">
            最新價格：低到高
          </option>

          <option value="symbol-asc">
            幣種：A 到 Z
          </option>

          <option value="symbol-desc">
            幣種：Z 到 A
          </option>
        </select>
      </label>
    </section>

    <section
      id="messageBox"
      class="message-box"
      aria-live="polite"
    ></section>

    <section class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>幣種</th>
              <th>TradingView</th>
              <th>最新價格</th>
              <th>24H 漲跌</th>
              <th>24H 最高</th>
              <th>24H 最低</th>
              <th>24H 成交量</th>
              <th>24H 成交額</th>
            </tr>
          </thead>

          <tbody id="marketTableBody">
            <tr>
              <td
                class="empty-cell"
                colspan="9"
              >
                正在等待市場資料
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer class="page-footer">
      公開市場資料僅供分析與測試，不構成投資建議。
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
